<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KKELL Hacker Community</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:#00ff66;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.logo{
width:300px;
max-width:80%;
filter:
drop-shadow(0 0 20px #00ff66)
drop-shadow(0 0 40px #00ff66);
}

h1{
margin-top:20px;
font-size:60px;
text-shadow:0 0 20px #00ff66;
}

.tag{
margin-top:10px;
font-size:20px;
color:#b8ffcf;
letter-spacing:4px;
}

.btn{
display:inline-block;
margin-top:30px;
padding:15px 35px;
border:2px solid #00ff66;
color:#00ff66;
text-decoration:none;
border-radius:8px;
transition:.3s;
}

.btn:hover{
background:#00ff66;
color:#000;
box-shadow:0 0 25px #00ff66;
}

.info{
margin-top:30px;
max-width:700px;
line-height:1.8;
color:#ddd;
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="hero">

<!-- GANTI DENGAN FILE LOGO -->
<img src="logo-kkell.png" alt="KKELL Logo" class="logo">

<h1>KKELL</h1>

<div class="tag">
HACK • LEARN • SECURE
</div>

<div class="info">
Komunitas pembelajaran teknologi, pemrograman,
cyber security, networking, dan pengembangan
keterampilan digital.
</div>

<a href="https://wa.me/6281326100892" class="btn">
Join WhatsApp
</a>

</div>

<script>
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const chars=
"01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&@";

const size=16;
const columns=canvas.width/size;

const drops=[];

for(let i=0;i<columns;i++){
drops[i]=1;
}

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff66";
ctx.font=size+"px monospace";

for(let i=0;i<drops.length;i++){

const text=
chars[Math.floor(Math.random()*chars.length)];

ctx.fillText(
text,
i*size,
drops[i]*size
);

if(
drops[i]*size>canvas.height &&
Math.random()>0.975
){
drops[i]=0;
}

drops[i]++;
}

}

setInterval(draw,33);

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});
</script>

</body>
</html>
